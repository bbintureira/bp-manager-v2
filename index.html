<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- `display=swap` would render fallback first then swap to Geist when
         loaded — that's the visible "size pop" some users report on slow
         networks. `display=block` blocks paint up to ~3s waiting for Geist
         and uses fallback only if it never arrives. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=block"
      rel="stylesheet"
    />
    <title>BP Manager</title>
    <script>
      // Apply theme synchronously to avoid flash. Default: light (dark mode
      // had visual bugs on the new BP dashboards).
      //
      // One-time migration: earlier builds defaulted to dark and persisted
      // 'dark' to localStorage on the very first load — even for users who
      // never explicitly toggled. We reset that here so existing users
      // also pick up the new light default. Anyone who consciously toggles
      // dark after the migration keeps it (the migration flag stays set).
      (function () {
        try {
          var MIGRATED = 'bp-theme-migrated-v2'
          if (!localStorage.getItem(MIGRATED)) {
            localStorage.removeItem('bp-theme')
            localStorage.setItem(MIGRATED, '1')
          }
          var t = localStorage.getItem('bp-theme') || 'light'
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {
          // No-op; falls through to light.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
